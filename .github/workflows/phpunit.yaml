name: Unit tests

on: [push, pull_request]

# Change default permissions from all to none.
permissions: {}

# Cancel previous runs of the same workflow for the same pull request or branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run:
    name: phpunit PHP ${{ matrix.php-version }}
    if: ${{ !startsWith(github.event.head_commit.message, 'Translation:') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5', '8.6']
      fail-fast: false
    # The CODECOV_TOKEN is stored as environment secret.
    environment: codecov

    steps:
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          ini-file: 'development'
          extensions: gd,intl,mbstring,sqlite,zip
          coverage: pcov

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't leave GITHUB_TOKEN in .git/config
          persist-credentials: false

      - run: composer validate

      - run: composer install --no-progress

      - run: vendor/bin/phpunit --coverage-clover=tests/coverage.xml

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tests/coverage.xml
